<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel | Spiritual Assistant</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #c9a87c;
      --gold-light: #f0e0c8;
      --gold-border: #e9d9c2;
      --bg: #fefaf5;
      --bg-card: #ffffff;
      --text: #3b2e24;
      --text-muted: #9e8b78;
      --danger: #d9534f;
      --danger-bg: #fdf0f0;
      --success: #3d9970;
      --success-bg: #edf7f2;
      --processing: #4a7cc7;
      --processing-bg: #eef3fb;
      --shadow: 0 2px 12px rgba(0,0,0,0.07);
      --radius: 12px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #f4ede3;
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }

    /* ── Top Bar ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #fff;
      border: 1px solid var(--gold-border);
      border-radius: var(--radius);
      padding: 14px 24px;
      margin-bottom: 24px;
      box-shadow: var(--shadow);
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .topbar-left h1 {
      font-family: 'Cinzel', serif;
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(135deg, #c0825e, #a0602a);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .topbar-left i { color: #b47c54; font-size: 18px; }

    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: transparent;
      border: 1px solid var(--gold-border);
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      text-decoration: none;
      transition: all 0.2s;
    }

    .btn-back:hover { border-color: var(--gold); color: var(--gold); }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    @media (max-width: 820px) { .grid { grid-template-columns: 1fr; } }

    .card {
      background: #fff;
      border: 1px solid var(--gold-border);
      border-radius: var(--radius);
      padding: 22px;
      box-shadow: var(--shadow);
    }

    .card-title {
      display: flex;
      align-items: center;
      gap: 9px;
      font-size: 13px;
      font-weight: 600;
      color: #9a6640;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 18px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--gold-border);
    }

    .card-title i { font-size: 14px; }

    /* ── Upload Zone ── */
    .upload-zone {
      border: 2px dashed var(--gold-border);
      border-radius: 10px;
      padding: 28px 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 14px;
      position: relative;
    }

    .upload-zone:hover, .upload-zone.drag-over {
      border-color: var(--gold);
      background: #fdf7f0;
    }

    .upload-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .upload-zone .uz-icon { font-size: 30px; color: #c9a87c; margin-bottom: 8px; }
    .upload-zone .uz-label { font-size: 13px; color: var(--text-muted); }
    .upload-zone .uz-file { font-size: 12px; color: var(--gold); margin-top: 6px; font-weight: 500; min-height: 16px; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      width: 100%;
      padding: 11px 16px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: var(--gold);
      color: white;
    }

    .btn-primary:hover:not(:disabled) { background: #b0894a; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-danger-sm {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      border: 1px solid #e0a0a0;
      background: transparent;
      color: var(--danger);
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .btn-danger-sm:hover { background: var(--danger-bg); border-color: var(--danger); }

    /* ── PDF List ── */
    .pdf-list {
      display: flex;
      flex-direction: column;
      gap: 7px;
      min-height: 60px;
    }

    .pdf-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      background: #fefaf5;
      border: 1px solid #f0e8dc;
      border-radius: 8px;
      font-size: 13px;
    }

    .pdf-item i.pdf-icon { color: #c9845a; font-size: 14px; flex-shrink: 0; }

    .pdf-item .pdf-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--text);
    }

    .empty-state {
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
      padding: 20px 0;
    }

    /* ── Pagination ── */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .page-btn {
      padding: 5px 11px;
      border: 1px solid var(--gold-border);
      border-radius: 6px;
      background: #fff;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.15s;
    }

    .page-btn:hover:not(:disabled) { border-color: var(--gold); color: var(--gold); }
    .page-btn.active { background: var(--gold); color: white; border-color: var(--gold); }
    .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Status Card ── */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 14px;
    }

    .status-ready    { background: #f0f0f0; color: #777; }
    .status-processing { background: var(--processing-bg); color: var(--processing); }
    .status-success,
    .status-completed { background: var(--success-bg); color: var(--success); }
    .status-failed,
    .status-error    { background: var(--danger-bg); color: var(--danger); }

    .fa-spin { animation: fa-spin 1s linear infinite; }
    @keyframes fa-spin { 100% { transform: rotate(360deg); } }

    .status-details {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.9;
      background: #fefaf5;
      border: 1px solid var(--gold-border);
      border-radius: 8px;
      padding: 12px 14px;
    }

    .status-details strong { color: var(--text); }

    /* ── Modals ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.active { display: flex; }

    .modal {
      background: #fff;
      border-radius: var(--radius);
      padding: 26px;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.18);
    }

    .modal h3 {
      font-family: 'Cinzel', serif;
      font-size: 15px;
      color: var(--text);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .modal p { font-size: 13px; color: var(--text-muted); margin-bottom: 18px; line-height: 1.6; }

    .modal-btns { display: flex; gap: 10px; }

    .modal-btns button {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      border: none;
      transition: all 0.2s;
    }

    .modal-btn-cancel { background: #f0ece8; color: var(--text-muted); }
    .modal-btn-cancel:hover { background: #e5e0db; }
    .modal-btn-confirm { background: var(--gold); color: white; }
    .modal-btn-confirm:hover { background: #b0894a; }
    .modal-btn-danger { background: var(--danger); color: white; }
    .modal-btn-danger:hover { background: #b53d3a; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 11px 18px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      color: white;
      z-index: 200;
      opacity: 0;
      transform: translateY(8px);
      transition: all 0.3s;
      pointer-events: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.success { background: var(--success); }
    .toast.error   { background: var(--danger); }
    .toast.info    { background: var(--processing); }

    .full-width { grid-column: 1 / -1; }

    /* ── Search Bar ── */
    .search-wrap {
      position: relative;
      margin-bottom: 12px;
    }

    .search-wrap .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 13px;
      pointer-events: none;
    }

    .search-wrap input {
      width: 100%;
      padding: 9px 12px 9px 34px;
      border: 1px solid var(--gold-border);
      border-radius: 8px;
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      background: #fefaf5;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .search-wrap input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(201, 168, 124, 0.15);
      background: #fff;
    }

    .search-wrap input::placeholder { color: var(--text-muted); }
  </style>
</head>
<body>

<!-- Top Bar -->
<header class="topbar">
  <div class="topbar-left">
    <i class="fa-solid fa-shield-halved"></i>
    <h1>Admin Panel</h1>
  </div>
  <a href="/" class="btn-back">
    <i class="fa-solid fa-arrow-left"></i> Back to Chat
  </a>
</header>

<div class="grid">

  <!-- Upload Card -->
  <div class="card">
    <div class="card-title">
      <i class="fa-solid fa-upload"></i> Upload PDF
    </div>
    <div class="upload-zone" id="uploadZone">
      <input type="file" id="fileInput" accept=".pdf" />
      <div class="uz-icon"><i class="fa-regular fa-file-pdf"></i></div>
      <div class="uz-label">Drag &amp; drop a PDF here, or click to browse</div>
      <div class="uz-file" id="fileName"></div>
    </div>
    <button class="btn btn-primary" id="btnUpload" onclick="uploadPDF()" disabled>
      <i class="fa-solid fa-upload"></i> Upload PDF
    </button>
  </div>

  <!-- Status Card -->
  <div class="card">
    <div class="card-title">
      <i class="fa-solid fa-circle-info"></i> Ingestion Status
    </div>
    <div id="statusBadge" class="status-badge status-ready">
      <i class="fa-solid fa-circle-check" id="statusIcon"></i>
      <span id="statusText">Ready</span>
    </div>
    <div id="statusDetails" class="status-details" style="display:none"></div>
  </div>

  <!-- PDF List Card (full width) -->
  <div class="card full-width">
    <div class="card-title">
      <i class="fa-solid fa-folder-open"></i> Books Folder
      <span id="pdfCount" style="font-size:11px;color:var(--text-muted);font-weight:400;text-transform:none;letter-spacing:0;margin-left:4px"></span>
    </div>
    <div class="search-wrap">
      <i class="fa-solid fa-magnifying-glass search-icon"></i>
      <input type="text" id="pdfSearch" placeholder="Search PDFs..." oninput="onSearch()" autocomplete="off" />
    </div>
    <div class="pdf-list" id="pdfList">
      <div class="empty-state">Loading PDFs…</div>
    </div>
    <div class="pagination" id="pagination"></div>
  </div>

</div>

<!-- Delete Modal -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal">
    <h3><i class="fa-solid fa-trash" style="color:var(--danger)"></i> Delete PDF</h3>
    <p id="deleteModalText"></p>
    <div class="modal-btns">
      <button class="modal-btn-cancel" onclick="closeModal('deleteModal')">Cancel</button>
      <button class="modal-btn-danger" onclick="confirmDelete()">
        <i class="fa-solid fa-trash"></i> Delete
      </button>
    </div>
  </div>
</div>

<!-- Replace Modal -->
<div class="modal-overlay" id="replaceModal">
  <div class="modal">
    <h3><i class="fa-solid fa-arrow-rotate-right" style="color:var(--gold)"></i> File Already Exists</h3>
    <p id="replaceModalText"></p>
    <div class="modal-btns">
      <button class="modal-btn-cancel" onclick="closeModal('replaceModal')">Cancel</button>
      <button class="modal-btn-confirm" onclick="proceedUpload()">Replace &amp; Re-ingest</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  const API_BASE = 'http://localhost:8000';
  const API_KEY  = 'sc-spiritual-8f4a2b9d1e6c3f7a0b5e2d8c4f1a9e3b';

  const PAGE_SIZE = 10;
  let allPdfs = [];
  let currentPage = 1;
  let selectedFile = null;
  let fileToDelete = null;
  let pollInterval = null;

  // ── Helpers ──────────────────────────────────────────────────────────

  function apiHeaders(extra) {
    return { 'X-API-KEY': API_KEY, ...extra };
  }

  function showToast(msg, type = 'info', icon = '') {
    const t = document.getElementById('toast');
    t.innerHTML = icon ? `<i class="fa-solid fa-${icon}"></i> ${msg}` : msg;
    t.className = `toast ${type} show`;
    setTimeout(() => t.classList.remove('show'), 3500);
  }

  function openModal(id) { document.getElementById(id).classList.add('active'); }
  function closeModal(id) { document.getElementById(id).classList.remove('active'); }

  // ── PDF List + Pagination ─────────────────────────────────────────────

  async function loadPDFs() {
    try {
      const res = await fetch(`${API_BASE}/admin/pdfs`, { headers: apiHeaders() });
      const data = await res.json();
      allPdfs = data.pdfs || [];
      currentPage = 1;
      renderPDFPage();
    } catch {
      document.getElementById('pdfList').innerHTML =
        '<div class="empty-state"><i class="fa-solid fa-triangle-exclamation"></i> Failed to load PDFs.</div>';
    }
  }

  function renderPDFPage() {
    const list = document.getElementById('pdfList');
    const paginationEl = document.getElementById('pagination');
    const countEl = document.getElementById('pdfCount');

    // Apply search filter
    const query = (document.getElementById('pdfSearch')?.value || '').toLowerCase().trim();
    const filtered = query
      ? allPdfs.filter(name => name.toLowerCase().includes(query))
      : allPdfs;

    countEl.textContent = `(${allPdfs.length} file${allPdfs.length !== 1 ? 's' : ''})`;

    if (filtered.length === 0) {
      list.innerHTML = query
        ? '<div class="empty-state"><i class="fa-solid fa-magnifying-glass"></i> No PDFs found.</div>'
        : '<div class="empty-state"><i class="fa-regular fa-folder-open"></i> No PDFs in books folder.</div>';
      paginationEl.innerHTML = '';
      return;
    }

    const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
    if (currentPage > totalPages) currentPage = 1;
    const start = (currentPage - 1) * PAGE_SIZE;
    const pageItems = filtered.slice(start, start + PAGE_SIZE);

    list.innerHTML = '';
    pageItems.forEach(name => {
      const item = document.createElement('div');
      item.className = 'pdf-item';
      item.innerHTML = `
        <i class="fa-regular fa-file-pdf pdf-icon"></i>
        <span class="pdf-name" title="${name}">${name}</span>
        <button class="btn-danger-sm" onclick="deletePDF('${name}')">
          <i class="fa-solid fa-trash"></i> Delete
        </button>`;
      list.appendChild(item);
    });

    // Pagination
    paginationEl.innerHTML = '';
    if (totalPages <= 1) return;

    const prevBtn = document.createElement('button');
    prevBtn.className = 'page-btn';
    prevBtn.innerHTML = '<i class="fa-solid fa-chevron-left"></i> Prev';
    prevBtn.disabled = currentPage === 1;
    prevBtn.onclick = () => { currentPage--; renderPDFPage(); };
    paginationEl.appendChild(prevBtn);

    for (let p = 1; p <= totalPages; p++) {
      const btn = document.createElement('button');
      btn.className = 'page-btn' + (p === currentPage ? ' active' : '');
      btn.textContent = p;
      btn.onclick = () => { currentPage = p; renderPDFPage(); };
      paginationEl.appendChild(btn);
    }

    const nextBtn = document.createElement('button');
    nextBtn.className = 'page-btn';
    nextBtn.innerHTML = 'Next <i class="fa-solid fa-chevron-right"></i>';
    nextBtn.disabled = currentPage === totalPages;
    nextBtn.onclick = () => { currentPage++; renderPDFPage(); };
    paginationEl.appendChild(nextBtn);
  }

  function onSearch() {
    currentPage = 1;
    renderPDFPage();
  }

  // ── Upload ────────────────────────────────────────────────────────────

  const fileInput = document.getElementById('fileInput');
  const uploadZone = document.getElementById('uploadZone');

  fileInput.addEventListener('change', () => {
    const f = fileInput.files[0];
    if (f) {
      selectedFile = f;
      document.getElementById('fileName').textContent = f.name;
      document.getElementById('btnUpload').disabled = false;
    }
  });

  uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
  uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
  uploadZone.addEventListener('drop', e => {
    e.preventDefault();
    uploadZone.classList.remove('drag-over');
    const f = e.dataTransfer.files[0];
    if (f && f.name.toLowerCase().endsWith('.pdf')) {
      selectedFile = f;
      document.getElementById('fileName').textContent = f.name;
      document.getElementById('btnUpload').disabled = false;
    } else {
      showToast('Only PDF files are allowed.', 'error', 'circle-exclamation');
    }
  });

  async function uploadPDF() {
    if (!selectedFile) return;

    // Check if file already exists
    const listRes = await fetch(`${API_BASE}/admin/pdfs`, { headers: apiHeaders() });
    const listData = await listRes.json();
    if (listData.pdfs && listData.pdfs.includes(selectedFile.name)) {
      document.getElementById('replaceModalText').textContent =
        `"${selectedFile.name}" already exists in the books folder. Replacing it will remove its existing vectors and re-ingest the new file.`;
      openModal('replaceModal');
      return;
    }

    await proceedUpload();
  }

  async function proceedUpload() {
    closeModal('replaceModal');
    if (!selectedFile) return;

    const formData = new FormData();
    formData.append('file', selectedFile);

    document.getElementById('btnUpload').disabled = true;
    setStatusUI({ status: 'processing', filename: selectedFile.name });
    showToast('Uploading…', 'info', 'spinner fa-spin');

    try {
      const res = await fetch(`${API_BASE}/admin/upload`, {
        method: 'POST',
        headers: apiHeaders(),
        body: formData,
      });

      if (res.ok) {
        showToast('Uploaded — ingestion started.', 'success', 'check');
        selectedFile = null;
        document.getElementById('fileName').textContent = '';
        fileInput.value = '';
        loadPDFs();
        startPolling();
      } else {
        const err = await res.json();
        showToast(err.detail || 'Upload failed.', 'error', 'circle-exclamation');
        document.getElementById('btnUpload').disabled = false;
        setStatusUI({ status: 'failed', error: err.detail || 'Upload failed.' });
      }
    } catch (e) {
      showToast('Upload error: ' + e.message, 'error', 'circle-exclamation');
      document.getElementById('btnUpload').disabled = false;
      setStatusUI({ status: 'failed', error: e.message });
    }
  }

  // ── Delete ────────────────────────────────────────────────────────────

  function deletePDF(name) {
    fileToDelete = name;
    document.getElementById('deleteModalText').textContent =
      `Delete "${name}"? This will remove the PDF and all its Qdrant vectors. This cannot be undone.`;
    openModal('deleteModal');
  }

  async function confirmDelete() {
    closeModal('deleteModal');
    if (!fileToDelete) return;

    try {
      const res = await fetch(`${API_BASE}/admin/pdfs/${encodeURIComponent(fileToDelete)}`, {
        method: 'DELETE',
        headers: apiHeaders(),
      });

      if (res.ok) {
        showToast(`Deleted: ${fileToDelete}`, 'success', 'check');
        loadPDFs();
      } else {
        const err = await res.json();
        showToast(err.detail || 'Delete failed.', 'error', 'circle-exclamation');
      }
    } catch (e) {
      showToast('Delete error: ' + e.message, 'error', 'circle-exclamation');
    }
    fileToDelete = null;
  }

  // ── Status UI ─────────────────────────────────────────────────────────

  function setStatusUI(data) {
    const badge = document.getElementById('statusBadge');
    const icon  = document.getElementById('statusIcon');
    const text  = document.getElementById('statusText');
    const det   = document.getElementById('statusDetails');

    const cfg = {
      ready:      { cls: 'status-ready',      iconCls: 'fa-circle-check',    label: 'Ready' },
      processing: { cls: 'status-processing', iconCls: 'fa-spinner fa-spin', label: 'Processing…' },
      completed:  { cls: 'status-completed',  iconCls: 'fa-circle-check',    label: 'Completed' },
      success:    { cls: 'status-success',    iconCls: 'fa-circle-check',    label: 'Completed' },
      failed:     { cls: 'status-failed',     iconCls: 'fa-circle-xmark',    label: 'Failed' },
      error:      { cls: 'status-error',      iconCls: 'fa-circle-xmark',    label: 'Failed' },
    };

    const c = cfg[data.status] || cfg.ready;
    badge.className = `status-badge ${c.cls}`;
    icon.className = `fa-solid ${c.iconCls}`;
    text.textContent = c.label;

    if (data.status === 'processing') {
      det.style.display = 'block';
      det.innerHTML = `<strong>File:</strong> ${data.filename || '—'}<br/><strong>Status:</strong> Indexing…`;
    } else if (data.status === 'completed' || data.status === 'success') {
      det.style.display = 'block';
      det.innerHTML =
        `<strong>File:</strong> ${data.filename || '—'}<br/>` +
        `<strong>Chunks:</strong> ${data.total_chunks}<br/>` +
        `<strong>Time:</strong> ${data.elapsed_seconds}s<br/>` +
        `<strong>Completed:</strong> ${data.completed_at}`;
    } else if (data.status === 'failed' || data.status === 'error') {
      det.style.display = 'block';
      det.innerHTML = `<strong style="color:var(--danger)">Error:</strong> ${data.error || 'Unknown error'}`;
    } else {
      det.style.display = 'none';
    }
  }

  // ── Polling ───────────────────────────────────────────────────────────

  function startPolling() {
    if (pollInterval) clearInterval(pollInterval);
    pollInterval = setInterval(pollStatus, 2000);
  }

  async function pollStatus() {
    try {
      const res = await fetch(`${API_BASE}/admin/ingest/status`, { headers: apiHeaders() });
      if (!res.ok) return;
      const data = await res.json();
      setStatusUI(data);

      if (data.status === 'completed' || data.status === 'success') {
        clearInterval(pollInterval);
        document.getElementById('btnUpload').disabled = !!selectedFile ? false : true;
        showToast('Ingestion complete!', 'success', 'check');
      } else if (data.status === 'failed' || data.status === 'error') {
        clearInterval(pollInterval);
        document.getElementById('btnUpload').disabled = false;
        showToast('Ingestion failed.', 'error', 'circle-exclamation');
      }
    } catch {}
  }

  // ── Init ──────────────────────────────────────────────────────────────

  loadPDFs();
  pollStatus();
</script>
</body>
</html>
